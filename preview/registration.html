<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
    <title>Products | TechnoDom</title>

    <link rel = "stylesheet" href = "css/style.css">
    <link rel = "stylesheet" href = "css/registration.css">
  </head>

  <body>

  <div class = "page-container">

    <header class = "site-header">
      <div class = "header-inner-elements">

        <a href = "index.html" class = "logo">
          <img src = "images/logo.png" alt = "TechnoDom logo">
        </a>

    <form class="search-form" action="search-result.html" method="GET">
      <input 
        type = "text" 
        class = "search-input" 
        placeholder = "Search products" 
        name = "q"
      >
    </form>

        <div class = "header-actions">

          <div class = "account-block">
            <span class = "account-name">My account</span>
            <a href = "account.html" class = "header-icon">
              <img src = "images/user.png" alt = "User profile icon">
            </a>
          </div>

          <div class = "shop-icons">
            <a href="favourites.html" class = "header-icon">
              <img src = "images/heart.png" alt = "Wishlist icon">
            </a>

            <a href = "cart-step1.html" class = "header-icon">
              <img src = "images/cart.png" alt = "Shopping cart icon">
            </a>
          </div>

        </div>

      </div>
    </header>

      <!-- MAIN CONTENT -->
      <main class = "site-main">
        <div class = "registration-container">
          <h1 class = "page-title">Registration</h1>

          <form class = "registration-form">
            <div class = "registration-grid">
              
              <div class = "info-column">
                <h3>Login Information</h3>
                <div class = "input-group">
                  <label>Sign-In Email</label>
                  <input type = "email">
                </div>
                <div class = "input-group">
                  <label>Password</label>
                  <input type = "password">
                </div>
                <div class = "input-group">
                  <label>Password Confirmation</label>
                  <input type = "password">
                </div>
              </div>

              <div class = "info-column">
                <h3>Delivery Information</h3>
                <div class = "input-group">
                  <label>Phone Number</label>
                  <input type = "tel">
                </div>
                <div class = "input-group">
                  <label>Country</label>
                  <input type = "text" class = "half-width">
                </div>
                <div class = "form-row">
                  <div class = "input-group">
                    <label>City</label>
                    <input type = "text">
                  </div>
                  <div class = "input-group">
                    <label>Post Index</label>
                    <input type = "text">
                  </div>
                </div>
                <div class = "input-group">
                  <label>Street name</label>
                  <input type = "text">
                </div>
              </div>

              <div class = "info-column">
                <h3>Personal Information</h3>
                <div class = "input-group">
                  <label>First Name</label>
                  <input type = "text">
                </div>
                <div class = "input-group">
                  <label>Last Name</label>
                  <input type = "text">
                </div>
              </div>

            </div>

            <div class = "form-actions">
              <button type = "submit" class = "btn-signup">Sign Up</button>
            </div>
          </form>
        </div>
      </main>

      <!-- FOOTER -->
      <footer class = "site-footer">
        <ul class = "footer-list">

          <li class = "footer-item"><a href = "about.html">About us</a></li>
          <li class = "footer-item"><a href = "contacts.html">Contacts</a></li>
          <li class = "footer-item"><a href = "tac.txt">Terms &amp; Conditions</a></li>
          <li class = "footer-item"><a href = "faq.html">FAQ</a></li>
          <li class = "footer-item"><a href = "support.html">Support</a></li>

        </ul>
      </footer>

    </div>
    <script src="js/hamurger-menu.js"></script>
  </body>
</html>
