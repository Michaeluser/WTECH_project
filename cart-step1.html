<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | TechnoDom</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>

<body>

<div class="page-container">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-top">

      <a href="index.html" class="logo">
        <img src="assets/images/logo.png" alt="TechnoDom logo">
      </a>

      <form class="search-form">
        <input type="text" class="search-input" placeholder="Search products">
      </form>

      <div class="header-actions">

        <div class="account-block">
          <span class="account-name">My account</span>
          <a href="#" class="header-icon">
            <img src="assets/images/user.png" alt="User profile">
          </a>
        </div>

        <div class="shop-icons">
          <a href="#" class="header-icon">
            <img src="assets/images/heart.png" alt="Wishlist">
          </a>

          <a href="cart-step1.html" class="header-icon">
            <img src="assets/images/cart.png" alt="Shopping cart">
          </a>
        </div>

      </div>

    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="site-main">
    <section class="cart-page">
      <h1 class="cart-title">Shopping Cart</h1>

      <div class="checkout-steps">
        <ul class="checkout-steps-list">
          <li class="active">Shopping Cart</li>
          <li>Shipping and Payment</li>
          <li>Location Details</li>
        </ul>
      </div>

      <div class="cart-layout">
        <div class="cart-items">

          <div class="cart-item">
            <div class="cart-item-image">
              <img src="assets/images/cat-gaming.jpg" alt="Gaming laptop">
            </div>

            <div class="cart-item-info">
              <h2>ASUS ROG Strix Gaming Laptop</h2>
            </div>

            <div class="cart-item-quantity">
              <button type="button">-</button>
              <span>1</span>
              <button type="button">+</button>
            </div>

            <div class="cart-item-price">
              1 599 €
            </div>
          </div>

          <div class="cart-item">
            <div class="cart-item-image">
              <img src="assets/images/product-1.jpg" alt="iPhone 17 Pro">
            </div>

            <div class="cart-item-info">
              <h2>iPhone 17 Pro 256 GB</h2>
            </div>

            <div class="cart-item-quantity">
              <button type="button">-</button>
              <span>1</span>
              <button type="button">+</button>
            </div>

            <div class="cart-item-price">
              1 339 €
            </div>
          </div>

        </div>
      </div>

      <div class ="cart-total">
        <h3>Total: <span class="cart-total-price">2 938 €</span></h3>
      </div>

      <div class="cart-actions">
        <a href="cart-step2.html" class="cart-next-button">Next</a>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <ul class="footer-list">
      <li class="footer-item"><a href="#">About us</a></li>
      <li class="footer-item"><a href="#">Contacts</a></li>
      <li class="footer-item"><a href="#">Terms &amp; Conditions</a></li>
      <li class="footer-item"><a href="#">FAQ</a></li>
      <li class="footer-item"><a href="#">Support</a></li>
    </ul>
  </footer>

</div>

</body>
</html>
