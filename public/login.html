<!DOCTYPE html>
<html lang = "en">
  <head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
    <title>Login TechnoDom</title>

    <link rel = "stylesheet" href = "css/style.css">
    <link rel = "stylesheet" href = "css/login.css">
  </head>

  <body>
    <div class = "page-container">
      <!--HEADER-->
      <header class = "site-header">
      </header>


      <!-- MAIN CONTENT -->
      <div class = "login-page-wrapper">

        <div class = "login-logo-header">
          <div class = "logo-box">
            <img src = "images/logo.png" alt = "Website logo">
          </div>
        </div>

        <div class = "login-container">
          <h2>Logging In</h2>
          
          <form class = "login-form">
            
            <div class = "input-group">
              <label>Email</label>
              <input type = "email">
            </div>
            
              <div class="input-group">
                <label>Password</label>
                <input type="password">
                <a href="#" class="form-link-small">Forgot password?</a>
              </div>

            <button type = "submit" class = "btn-login">Log In</button>
            
            <div class = "login-footer-links">
              <a href = "registration.html" class = "form-link-small">Register Instead</a>
            </div>

            <p class = "staff-login-text">
              Staff member?
              <a href = "admin-login.html" class = "staff-login-link">Sign in to admin panel</a>
            </p>

          </form>

        </div>
        
      </div>


    </div>

  </body>
</html>
