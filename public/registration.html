<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | TechnoDom</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/registration.css">
</head>

<body>

<div class="page-container">

<!-- HEADER -->
<header class="site-header">
  <div class="header-top">

    <a href="index.html" class="logo">
      <img src="images/logo.png" alt="TechnoDom logo">
    </a>

    <form class="search-form">
      <input type="text" class="search-input" placeholder="Search products">
    </form>

    <div class="header-actions">

      <div class="account-block">
        <span class="account-name">My account</span>
        <a href="#" class="header-icon">
          <img src="images/user.png" alt="User profile">
        </a>
      </div>

      <div class="shop-icons">

        <a href="#" class="header-icon">
          <img src="images/heart.png" alt="Wishlist">
        </a>

        <a href="cart.html" class="header-icon">
          <img src="images/cart.png" alt="Shopping cart">
        </a>

      </div>

    </div>

  </div>
</header>

<!-- NAVBAR -->
<nav class="main-nav">
  <ul class="nav-list">

    <li class="nav-item"><a href="#">Laptops</a></li>
    <li class="nav-item"><a href="#">Phones</a></li>
    <li class="nav-item"><a href="#">PC components</a></li>
    <li class="nav-item"><a href="#">Monitors</a></li>
    <li class="nav-item"><a href="#">TV&Audio</a></li>
    <li class="nav-item"><a href="#">Gaming</a></li>
    <li class="nav-item"><a href="#">Accessories</a></li>
    <li class="nav-item"><a href="#">Sale</a></li>

  </ul>
</nav>

<!-- MAIN CONTENT -->
<div class="registration-container">
  <h1 class="page-title">Registration</h1>

  <form class="registration-form">
    <div class="registration-grid">
      
      <div class="info-column">
        <h3>Login Information</h3>
        <div class="input-group">
          <label>Sign-In Email</label>
          <input type="email">
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password">
        </div>
        <div class="input-group">
          <label>Password Confirmation</label>
          <input type="password">
        </div>
      </div>

      <div class="info-column">
        <h3>Delivery Information</h3>
        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel">
        </div>
        <div class="input-group">
          <label>Country</label>
          <input type="text" class="half-width">
        </div>
        <div class="form-row">
          <div class="input-group">
            <label>City</label>
            <input type="text">
          </div>
          <div class="input-group">
            <label>Post Index</label>
            <input type="text">
          </div>
        </div>
        <div class="input-group">
          <label>Street name</label>
          <input type="text">
        </div>
      </div>

      <div class="info-column">
        <h3>Personal Information</h3>
        <div class="input-group">
          <label>First Name</label>
          <input type="text">
        </div>
        <div class="input-group">
          <label>Last Name</label>
          <input type="text">
        </div>
      </div>

    </div>

    <div class="form-actions">
      <button type="submit" class="btn-signup">Sign Up</button>
    </div>
  </form>
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <ul class="footer-list">

    <li class="footer-item"><a href="#">About us</a></li>
    <li class="footer-item"><a href="#">Contacts</a></li>
    <li class="footer-item"><a href="#">Terms &amp; Conditions</a></li>
    <li class="footer-item"><a href="#">FAQ</a></li>
    <li class="footer-item"><a href="#">Support</a></li>

  </ul>
</footer>

</div>

</body>
</html>
